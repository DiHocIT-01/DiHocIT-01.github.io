<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeonSo | Bio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    transition:0.4s;
}

/* ===== Animated Gradient Background ===== */
body::before{
    content:"";
    position:absolute;
    width:400%;
    height:400%;
    background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#00ffcc);
    background-size:400% 400%;
    animation:gradientMove 15s ease infinite;
    z-index:-3;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ===== Particle Canvas ===== */
canvas{
    position:absolute;
    z-index:-2;
}

/* ===== Loader ===== */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    transition:1s ease;
}

.logo-animate{
    font-size:55px;
    font-weight:700;
    letter-spacing:6px;
    background:linear-gradient(90deg,#00ffcc,#00ffff,#00ffcc,#00ffff);
    background-size:300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:gradientRun 2s linear infinite;
    text-shadow:
        0 0 5px #00ffff,
        0 0 10px #00ffff,
        0 0 20px #00ffcc,
        0 0 40px #00ffcc;
}

@keyframes gradientRun{
    0%{background-position:0%}
    100%{background-position:300%}
}

.hide-loader{
    opacity:0;
    visibility:hidden;
}

/* ===== Card ===== */
.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:20px;
    width:380px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:130px;
    border-radius:50%;
    margin-bottom:15px;
    border:3px solid rgba(255,255,255,0.4);
}

#typing{
    font-size:24px;
    font-weight:600;
    margin-bottom:8px;
}

p{
    font-size:14px;
    opacity:0.85;
    margin-bottom:20px;
}

a{
    display:block;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    background:white;
    color:#243b55;
    transition:0.3s;
}

a i{
    margin-right:8px;
}

a:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(255,255,255,0.6);
}

.toggle{
    position:absolute;
    top:20px;
    right:20px;
    cursor:pointer;
    font-size:20px;
}

.light{
    color:#222;
}

.light .card{
    background:rgba(255,255,255,0.85);
}

.light a{
    background:#243b55;
    color:white;
}
</style>
</head>

<body>

<!-- ===== Intro Loader ===== -->
<div id="loader">
    <h1 class="logo-animate">LEON SO</h1>
</div>

<!-- ===== Intro Music ===== -->
<audio id="introMusic" autoplay>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6e2a6e5f09.mp3?filename=ambient-piano-110624.mp3" type="audio/mp3">
</audio>

<div class="toggle" onclick="toggleMode()">
    <i class="fa-solid fa-moon"></i>
</div>

<canvas id="particles"></canvas>

<div class="card">
    <img src="https://via.placeholder.com/130">
    <div id="typing"></div>
    <p>IT Student | Java | Arduino | WinForms</p>

    <a href="https://www.facebook.com/duyluve5.vvd" target="_blank">
        <i class="fa-brands fa-facebook"></i>Facebook
    </a>

    <a href="https://www.tiktok.com/@duyluve5.vvd" target="_blank">
        <i class="fa-brands fa-tiktok"></i>TikTok
    </a>

    <a href="https://github.com/DiHocIT-01" target="_blank">
        <i class="fa-brands fa-github"></i>GitHub
    </a>
</div>

<script>

/* ===== Loader Hide ===== */
window.addEventListener("load", function(){
    setTimeout(()=>{
        document.getElementById("loader").classList.add("hide-loader");
    },2500);
});

/* ===== Dark Mode ===== */
function toggleMode(){
    document.body.classList.toggle("light");
}

/* ===== Typing Effect ===== */
const text = "LeonSo";
const typingElement = document.getElementById("typing");
let index = 0;

function typeEffect() {
    if (index < text.length) {
        typingElement.innerHTML += text.charAt(index);
        index++;
        setTimeout(typeEffect, 150);
    }
}

typeEffect();

/* ===== Hacker Particle ===== */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

for(let i=0;i<100;i++){
    particlesArray.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speedY:Math.random()*1+0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(0,255,150,0.7)";
    particlesArray.forEach(p=>{
        ctx.fillRect(p.x,p.y,p.size,p.size);
        p.y+=p.speedY;
        if(p.y>canvas.height){
            p.y=0;
            p.x=Math.random()*canvas.width;
        }
    });
    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
