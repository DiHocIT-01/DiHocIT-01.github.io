<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeonSo | Bio</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    transition:0.5s;
}

/* Animated Gradient */
body::before{
    content:"";
    position:absolute;
    width:400%;
    height:400%;
    background:linear-gradient(-45deg,#141e30,#243b55,#0f2027,#2c5364);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
    z-index:-2;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Particles Canvas */
canvas{
    position:absolute;
    z-index:-1;
}

/* Card */
.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:20px;
    width:380px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-5px);
}

/* Avatar */
.card img{
    width:130px;
    border-radius:50%;
    margin-bottom:15px;
    border:3px solid rgba(255,255,255,0.4);
}

/* Typing */
.typing{
    font-size:24px;
    font-weight:600;
    border-right:3px solid white;
    width:fit-content;
    margin:auto;
    white-space:nowrap;
    overflow:hidden;
    animation:typing 3s steps(20,end), blink 0.7s infinite;
}

@keyframes typing{
    from{width:0;}
    to{width:100%;}
}

@keyframes blink{
    50%{border-color:transparent;}
}

/* Links */
a{
    display:block;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    background:white;
    color:#243b55;
    transition:0.3s;
}

a i{
    margin-right:8px;
}

a:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(255,255,255,0.6);
}

/* Dark mode toggle */
.toggle{
    position:absolute;
    top:20px;
    right:20px;
    cursor:pointer;
    font-size:20px;
}

/* Light mode */
.light{
    color:#222;
}

.light .card{
    background:rgba(255,255,255,0.7);
}

.light a{
    background:#243b55;
    color:white;
}

</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">
    <i class="fa-solid fa-moon"></i>
</div>

<canvas id="particles"></canvas>

<div class="card">
    <img src="https://via.placeholder.com/130">
    <div class="typing">LeonSo</div>
    <p>IT Student | Java | Arduino | WinForms</p>

    <a href="https://www.facebook.com/duyluve5.vvd" target="_blank">
        <i class="fa-brands fa-facebook"></i>Facebook
    </a>

    <a href="https://www.tiktok.com/@duyluve5.vvd" target="_blank">
        <i class="fa-brands fa-tiktok"></i>TikTok
    </a>

    <a href="https://github.com/DiHocIT-01" target="_blank">
        <i class="fa-brands fa-github"></i>GitHub
    </a>
</div>

<script>

/* Dark mode toggle */
function toggleMode(){
    document.body.classList.toggle("light");
}

/* Simple hacker particles */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

for(let i=0;i<80;i++){
    particlesArray.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speedY:Math.random()*1+0.5
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(0,255,0,0.7)";
    particlesArray.forEach(p=>{
        ctx.fillRect(p.x,p.y,p.size,p.size);
        p.y+=p.speedY;
        if(p.y>canvas.height){
            p.y=0;
            p.x=Math.random()*canvas.width;
        }
    });
    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
